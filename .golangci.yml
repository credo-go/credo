version: "2"

run:
  go: "1.26"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - unconvert
    - whitespace
    # staticcheck and unused are temporarily disabled on the Go 1.27 release
    # candidate: their shared honnef.co/go/tools IR builder (bundled in
    # golangci-lint v2.12.2 as v0.7.0) panics while building IR for the go1.27rc1
    # standard library — "buildir: unexpected expr: *ast.KeyValueExpr" on
    # internal/poll. install-mode: goinstall rebuilds the linter frontend against
    # 1.27, but cannot patch staticcheck's own IR construction. The framework code
    # itself is clean under `go vet` on go1.27rc1. Re-enable once golangci-lint
    # ships a staticcheck release that supports Go 1.27 (expected around 1.27 GA).
    # - staticcheck
    # - unused
  settings:
    gosec:
      excludes:
        - G104
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/credo-go/credo
  exclusions:
    generated: lax
