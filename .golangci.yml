version: "2"

run:
  go: "1.26"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    gosec:
      excludes:
        - G104
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/credo-go/credo
  exclusions:
    generated: lax
