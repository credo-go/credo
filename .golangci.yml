version: "2"

run:
  go: "1.26"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - govet
    - ineffassign
    - misspell
    - nilerr
    - unconvert
    - whitespace
    # staticcheck, unused, and gosec are temporarily disabled on the Go 1.27
    # release candidate: their SSA/IR analysis engines panic while building IR for
    # go1.27rc1 code. staticcheck and unused share honnef.co/go/tools v0.7.0's IR
    # builder ("buildir: unexpected expr: *ast.KeyValueExpr" on internal/poll);
    # gosec's SSA taint analysis panics ("panic: T") in its callgraph builder.
    # install-mode: goinstall rebuilds the linter frontend against 1.27 but cannot
    # patch these engines. The framework code is clean under `go vet` on go1.27rc1,
    # and the lint-full-canary CI job keeps running all three (non-blocking) so the
    # upstream fix is caught early. Re-enable here — and drop the canary job — once
    # golangci-lint ships staticcheck/gosec releases that support Go 1.27.
    # - staticcheck
    # - unused
    # - gosec
  settings:
    gosec:
      excludes:
        - G104
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/credo-go/credo
  exclusions:
    generated: lax
