name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Go 1.27 is pre-GA: actions/setup-go cannot resolve the `toolchain go1.27rc1`
# directive in go.mod (the bare `1.27rc1` spec is not valid semver, so both the
# manifest lookup and the direct download fail). Pin the release candidate with
# the semver-prerelease form setup-go accepts; it maps to the go1.27rc1 build.
# Once 1.27 GA ships and go.mod drops the rc toolchain line, the setup-go steps
# can return to `go-version-file: go.mod`.
env:
  GO_VERSION: "1.27.0-rc.1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

  test-sqldb:
    name: Test (store/sqldb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run submodule tests
        working-directory: store/sqldb
        run: go test -race -count=1 ./...

      - name: Vet
        working-directory: store/sqldb
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

  tidy:
    name: Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go mod tidy (root)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go mod tidy (store/sqldb)
        working-directory: store/sqldb
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  examples:
    name: Examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [examples/saas, examples/hello]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # Each example is its own module (replace github.com/credo-go/credo => ../..),
      # so it exercises the framework's generic-method call sites across a module
      # boundary — the gate that would break first on a Go 1.27 migration slip.
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Tidy
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # install-mode goinstall builds golangci-lint from source with the Go
      # toolchain set up above, so it links a go/types that understands Go 1.27
      # generic methods (a prebuilt binary may lag the toolchain). The config
      # disables the linters whose SSA/IR engines panic on the 1.27 RC; the
      # lint-full-canary job below runs those non-blocking. See .golangci.yml.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: goinstall

  lint-full-canary:
    name: Lint (full, canary)
    runs-on: ubuntu-latest

    # Non-blocking early-warning job: runs the linters the required Lint job
    # disables on the Go 1.27 RC (staticcheck, unused, gosec — their SSA/IR
    # engines currently panic; see .golangci.yml). It must NOT be a required
    # check in branch protection. When this turns green, the upstream tooling
    # supports 1.27: restore the three linters to the required job and delete
    # this canary.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint (full)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: goinstall
          args: --enable=staticcheck --enable=unused --enable=gosec
