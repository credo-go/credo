name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday 05:23 UTC

permissions:
  contents: read

# Pin the Go 1.27 release candidate explicitly: actions/setup-go cannot resolve
# the `toolchain go1.27rc1` directive from go.mod (see ci.yml for the full note).
env:
  GO_VERSION: "1.27.0-rc.1"

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      # Manual build mode so the extractor traces BOTH modules — autobuild
      # would only see the root module.
      - name: Build (root module)
        run: go build ./...

      - name: Build (store/sqldb)
        working-directory: store/sqldb
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
