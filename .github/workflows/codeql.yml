name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual

      # Manual build mode so the extractor traces BOTH modules — autobuild
      # would only see the root module.
      - name: Build (root module)
        run: go build ./...

      - name: Build (store/sqldb)
        working-directory: store/sqldb
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
